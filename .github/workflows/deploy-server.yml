name: Deploy Analytics Server
on:
  push:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          # Push only the server/ subtree to Heroku
          git remote add heroku https://heroku:${HEROKU_API_KEY}@git.heroku.com/cerebral-analytics.git
          git subtree split --prefix server -b deploy-branch
          git push heroku deploy-branch:main --force
